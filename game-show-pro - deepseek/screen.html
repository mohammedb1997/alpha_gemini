<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>شاشة العرض</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hud">
        <div id="scoreA">🔴 0</div>
        <div id="timer">⏳ 30</div>
        <div id="scoreB">🟢 0</div>
    </div>
    <div id="letter"></div>
    <div id="question"></div>
    <div id="leaderboard"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>

    <script>
        // نقاط الفريقين
        let scores = { a: 0, b: 0 };

        // بدء الاستماع للتغييرات
        listen();

        // تحديث واجهة المستخدم
        function updateUI(data) {
            if (!data) return;

            // الحرف
            document.getElementById("letter").innerText = data.current?.letter || "";

            // المؤقت
            let timerValue = data.timer ?? 30;
            document.getElementById("timer").innerText = "⏳ " + timerValue;

            // السؤال
            let qEl = document.getElementById("question");
            if (data.current?.show) {
                qEl.style.display = "block";
                qEl.innerText = data.current.q || "";
            } else {
                qEl.style.display = "none";
            }

            // معالجة النقاط (عند تحديث lastPoint)
            if (data.lastPoint) {
                if (data.lastPoint === 'a') scores.a++;
                else if (data.lastPoint === 'b') scores.b++;
                renderScores();
            }

            // عرض من ضغط على الجرس (اختياري)
            if (data.current?.buzzer) {
                // يمكن إظهار رسالة قصيرة (لم نضف عنصر مخصص)
            }
        }

        function renderScores() {
            document.getElementById("scoreA").innerText = "🔴 " + scores.a;
            document.getElementById("scoreB").innerText = "🟢 " + scores.b;
            document.getElementById("leaderboard").innerHTML =
                `🔴 الفريق الأحمر: ${scores.a}<br>🟢 الفريق الأخضر: ${scores.b}`;
        }

        // استدعاء أولي
        renderScores();
    </script>
</body>
</html>
