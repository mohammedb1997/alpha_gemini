<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة اللاعب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; text-align: center; padding: 30px; }
        input, button { font-size: 24px; padding: 15px 30px; margin: 10px; border-radius: 50px; border: none; }
        input { background: #222; color: #fff; border: 1px solid #555; width: 200px; text-align: center; }
        .buzzer-btn { font-size: 60px; padding: 30px 60px; border-radius: 100px; background: #c0392b; color: white; }
        .buzzer-btn.green { background: #27ae60; }
    </style>
</head>
<body>
    <h1>📱 لاعب</h1>
    <div>
        <input id="room" placeholder="كود الغرفة">
        <button onclick="join()">دخول</button>
    </div>
    <div style="margin-top: 50px;">
        <button class="buzzer-btn" onclick="buzz('a')">🔴</button>
        <button class="buzzer-btn green" onclick="buzz('b')">🟢</button>
    </div>
    <p id="status"></p>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script>
        function join() {
            let id = document.getElementById("room").value.trim();
            if (!id) return alert("أدخل كود الغرفة");
            joinRoom(id);
            listen();
            document.getElementById("status").innerText = "متصل بالغرفة: " + id;
        }

        // تخصيص دالة updateUI لعرض تنبيه عند الضغط على الجرس
        const originalUpdateUI = window.updateUI;
        window.updateUI = function(data) {
            if (originalUpdateUI) originalUpdateUI(data);
            if (data.current?.buzzer) {
                document.getElementById("status").innerText = "تم الضغط من الفريق: " + data.current.buzzer;
                setTimeout(() => {
                    document.getElementById("status").innerText = "";
                }, 2000);
            }
        };
    </script>
</body>
</html>
