<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>البازر · تحدي الحروف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
:root{--a:#FF6B6B;--b:#4ECDC4;--gold:#FFE66D;--bg:#0f0f1a;--s1:#1a1a2e;--s2:#16213e;--txt:#e8eaf6;--dim:rgba(232,234,246,.45)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;color:var(--txt);background:var(--bg)}

.screen{display:none;width:100%;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.screen.active{display:flex}

/* ── JOIN ── */
#js{gap:18px;background:radial-gradient(ellipse 80% 50% at 50% 0,rgba(78,205,196,.1) 0,transparent 60%)}
.logo{text-align:center}
.logo h1{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;background:linear-gradient(135deg,var(--gold),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo p{color:var(--dim);font-size:.9rem;margin-top:4px}
.card{background:var(--s1);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:24px 20px;width:100%;max-width:380px}
.card h2{font-size:1.15rem;font-weight:700;color:var(--gold);text-align:center;margin-bottom:16px}
.inp{width:100%;background:var(--s2);border:2px solid rgba(255,255,255,.1);border-radius:13px;padding:13px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;outline:none;margin-bottom:14px;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.team-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.team-btn{padding:15px 8px;border:3px solid transparent;border-radius:14px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:all .15s;background:var(--s2);color:var(--dim)}
.team-btn:active{transform:scale(.96)}
.team-btn.sel-a{background:rgba(255,107,107,.2);border-color:var(--a);color:var(--a)}
.team-btn.sel-b{background:rgba(78,205,196,.2);border-color:var(--b);color:var(--b)}
.btn-join{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),#ffb347);color:#1a0a0a;font-family:'Cairo',sans-serif;font-size:1.15rem;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 6px 18px rgba(255,230,109,.3)}
.btn-join:active{transform:scale(.97)}
.err{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);border-radius:10px;padding:10px;color:var(--a);font-size:.88rem;font-weight:700;text-align:center;display:none;margin-top:10px}

/* ── WAITING ── */
#ws{gap:16px;text-align:center}
.avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;animation:float 2.2s ease-in-out infinite}
.av-a{background:rgba(255,107,107,.15);border:3px solid var(--a)}
.av-b{background:rgba(78,205,196,.15);border:3px solid var(--b)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.p-name{font-size:1.8rem;font-weight:900}
.p-name.ta{color:var(--a)}.p-name.tb{color:var(--b)}
.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 18px;border-radius:40px;font-size:.95rem;font-weight:700}
.ba{background:rgba(255,107,107,.15);border:1.5px solid rgba(255,107,107,.35);color:var(--a)}
.bb{background:rgba(78,205,196,.15);border:1.5px solid rgba(78,205,196,.35);color:var(--b)}
.wait-msg{color:var(--dim);font-size:.92rem}

/* ── BUZZER ── */
#bzs{gap:18px;text-align:center;position:relative;overflow:hidden}
#bzs::before{content:'';position:fixed;inset:0;background:var(--bg);z-index:-1}

.qcard{background:var(--s1);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:15px 18px;width:100%;max-width:380px;font-size:1.1rem;font-weight:700;line-height:1.6;text-align:center;display:none}

/* BIG BUZZER BUTTON */
.bz-btn{
  width:min(220px,60vw);
  height:min(220px,60vw);
  border-radius:50%;
  border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
  font-family:'Cairo',sans-serif;font-weight:900;
  font-size:1.2rem;
  transition:all .12s;
  position:relative;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.bz-btn.ta{background:radial-gradient(circle at 35% 35%,#ff9090,var(--a));color:white;box-shadow:0 12px 40px rgba(255,107,107,.4),0 0 0 8px rgba(255,107,107,.1)}
.bz-btn.tb{background:radial-gradient(circle at 35% 35%,#7eeee9,var(--b));color:#0a1a1a;box-shadow:0 12px 40px rgba(78,205,196,.4),0 0 0 8px rgba(78,205,196,.1)}
.bz-btn.ready{animation:pulse-bz 1.1s ease infinite}
@keyframes pulse-bz{
  0%,100%{box-shadow:0 12px 40px rgba(255,107,107,.4),0 0 0 8px rgba(255,107,107,.1)}
  50%{box-shadow:0 16px 60px rgba(255,107,107,.7),0 0 0 22px rgba(255,107,107,.05)}
}
.bz-btn.tb.ready{animation:pulse-bz-b 1.1s ease infinite}
@keyframes pulse-bz-b{
  0%,100%{box-shadow:0 12px 40px rgba(78,205,196,.4),0 0 0 8px rgba(78,205,196,.1)}
  50%{box-shadow:0 16px 60px rgba(78,205,196,.7),0 0 0 22px rgba(78,205,196,.05)}
}
.bz-btn.disabled{opacity:.35;cursor:not-allowed;animation:none!important}
.bz-btn:active:not(.disabled){transform:scale(.93)}
.bz-icon{font-size:2.8rem;line-height:1}
.bz-lbl{font-size:1.1rem;font-weight:900}

/* RESULT CARD */
.res-card{display:none;background:var(--s1);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px 22px;text-align:center;max-width:340px;animation:sUp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes sUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.res-name{font-size:1.5rem;font-weight:900;margin-bottom:3px}
.res-sub{font-size:.82rem;opacity:.7}
.res-count{font-size:3.8rem;font-weight:900;line-height:1;margin:6px 0;font-family:monospace}

.bz-status{color:var(--dim);font-size:.9rem;font-weight:700;text-align:center}

/* RIPPLE */
.rpl{position:fixed;border-radius:50%;pointer-events:none;animation:rplOut .5s ease-out forwards;z-index:1}
@keyframes rplOut{from{opacity:.5;transform:scale(0)}to{opacity:0;transform:scale(8)}}
</style>
</head>
<body>

<!-- JOIN -->
<div id="js" class="screen active">
  <div class="logo"><h1>⚡ تحدي الحروف</h1><p>انضم كلاعب</p></div>
  <div class="card">
    <h2>👤 أدخل بياناتك</h2>
    <input id="pname" class="inp" type="text" placeholder="اكتب اسمك" maxlength="20" autocomplete="off">
    <div class="team-row">
      <button class="team-btn" id="btn-a" onclick="selTeam('a')">🔴 الفريق أ</button>
      <button class="team-btn" id="btn-b" onclick="selTeam('b')">🟢 الفريق ب</button>
    </div>
    <button class="btn-join" onclick="joinGame()">انضم للعبة 🚀</button>
    <div class="err" id="err-msg">يرجى إدخال اسمك واختيار الفريق</div>
  </div>
</div>

<!-- WAITING -->
<div id="ws" class="screen">
  <div class="avatar" id="av">🎮</div>
  <div class="p-name" id="pn"></div>
  <div id="pbadge"></div>
  <div class="wait-msg" id="wmsg">في انتظار بدء السؤال...</div>
  <div class="wait-msg" style="opacity:.4;font-size:.78rem;margin-top:6px">ابق في هذه الشاشة</div>
</div>

<!-- BUZZER -->
<div id="bzs" class="screen">
  <div class="qcard" id="qcard">السؤال يظهر هنا</div>
  <button class="bz-btn disabled" id="main-bz" ontouchend="pressBz(event)" onclick="pressBz(event)">
    <span class="bz-icon">⚡</span>
    <span class="bz-lbl">اضغط!</span>
  </button>
  <div class="res-card" id="res-card">
    <div class="res-name" id="res-name"></div>
    <div class="res-sub"  id="res-sub"></div>
    <div class="res-count" id="res-count"></div>
  </div>
  <div class="bz-status" id="bz-st">في انتظار الإشارة...</div>
</div>

<script>
const params=new URLSearchParams(location.search);
const CODE=params.get('code')||'';
const ICE={config:{iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'}
]}};

let me={name:'',team:'',id:''};
let selT='', peer=null, conn=null;
let bzEnabled=false, cdI=null;
let gameState=null;

function selTeam(t){
  selT=t;
  document.getElementById('btn-a').className='team-btn'+(t==='a'?' sel-a':'');
  document.getElementById('btn-b').className='team-btn'+(t==='b'?' sel-b':'');
}

function joinGame(){
  const name=document.getElementById('pname').value.trim();
  const err=document.getElementById('err-msg');
  if(!name){err.innerText='يرجى إدخال اسمك';err.style.display='block';setTimeout(()=>err.style.display='none',2500);return;}
  if(!selT){err.innerText='يرجى اختيار فريقك';err.style.display='block';setTimeout(()=>err.style.display='none',2500);return;}

  me={name,team:selT,id:'p_'+Math.random().toString(36).substr(2,8)};

  peer=new Peer(ICE);
  peer.on('open',()=>{
    const targetId='hexgame-'+(CODE||'DEMO');
    conn=peer.connect(targetId,{reliable:true});
    conn.on('open',()=>{
      conn.send({type:'join',name:me.name,team:me.team,id:me.id});
      showWaiting();
    });
    conn.on('data',onData);
    conn.on('error',e=>console.warn('conn error',e));
  });
  peer.on('error',e=>{
    err.innerText='خطأ في الاتصال: '+e.type;
    err.style.display='block';
  });
}

function showWaiting(){
  document.getElementById('js').classList.remove('active');
  document.getElementById('ws').classList.add('active');
  const tname=gameState?(me.team==='a'?gameState.teamA:gameState.teamB):(me.team==='a'?'الفريق أ':'الفريق ب');
  document.getElementById('av').className='avatar '+(me.team==='a'?'av-a':'av-b');
  document.getElementById('av').innerText=me.team==='a'?'🔴':'🟢';
  document.getElementById('pn').className='p-name t'+me.team;
  document.getElementById('pn').innerText=me.name;
  document.getElementById('pbadge').innerHTML=`<div class="badge b${me.team}">${tname}</div>`;
  document.getElementById('wmsg').innerText='في انتظار اختيار سؤال...';
}

function onData(d){
  if(d.type==='joined'){ gameState=d; return; }
  if(d.type==='state'){ gameState=d.s; syncState(d.s); return; }
  if(d.type==='buzzer_ready'){ activateBuzzer(d.letter); return; }
  if(d.type==='show_q'){ showQ(d.q); return; }
  if(d.type==='buzzer_won'){ onBuzzerWon(d.winner); return; }
  if(d.type==='second_chance'){ onSecondChance(d.team); return; }
  if(d.type==='open_q'){ onOpenQ(); return; }
  if(d.type==='correct'||d.type==='skip'){ resetToWaiting(); return; }
  if(d.type==='tick'){ updateCountdown(d.secs); return; }
  if(d.type==='new_round'){ resetToWaiting(); return; }
}

function syncState(s){
  if(!s) return;
  // update team names in join screen
  if(document.getElementById('btn-a')){
    document.getElementById('btn-a').innerText='🔴 '+(s.teamA||'الفريق أ');
    document.getElementById('btn-b').innerText='🟢 '+(s.teamB||'الفريق ب');
  }
}

function activateBuzzer(letter){
  bzEnabled=true;
  goToBuzzer();
  const btn=document.getElementById('main-bz');
  btn.className='bz-btn t'+me.team+' ready';
  btn.innerHTML='<span class="bz-icon">⚡</span><span class="bz-lbl">اضغط الآن!</span>';
  document.getElementById('res-card').style.display='none';
  document.getElementById('bz-st').innerText='⚡ اضغط البازر بأسرع ما يمكن!';
  document.getElementById('bz-st').style.color='var(--gold)';
}

function showQ(q){
  const qc=document.getElementById('qcard');
  qc.innerText='❓ '+q;
  qc.style.display='block';
}

function goToBuzzer(){
  document.getElementById('ws').classList.remove('active');
  document.getElementById('bzs').classList.add('active');
}

function pressBz(e){
  if(e) e.preventDefault();
  if(!bzEnabled) return;
  bzEnabled=false;
  // ripple
  if(e&&(e.touches||e.clientX)){
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const r=document.createElement('div');r.className='rpl';
    const sz=80;r.style.cssText=`left:${cx-sz/2}px;top:${cy-sz/2}px;width:${sz}px;height:${sz}px;background:${me.team==='a'?'rgba(255,107,107,.4)':'rgba(78,205,196,.4)'}`;
    document.body.appendChild(r);setTimeout(()=>r.remove(),600);
  }
  if(navigator.vibrate) navigator.vibrate([60,30,80]);
  if(conn&&conn.open) conn.send({type:'buzz',name:me.name,team:me.team,id:me.id});
}

function onBuzzerWon(winner){
  const isMe=winner.id===me.id;
  const btn=document.getElementById('main-bz');
  if(isMe){
    btn.className='bz-btn t'+me.team;
    btn.innerHTML='<span class="bz-icon">🎤</span><span class="bz-lbl">أجب الآن!</span>';
    setRes(me.name+' 🎉','⚡ أنت الأول! أجب على الحكم',5,'var(--'+me.team+')');
    document.getElementById('bz-st').innerText='✅ أنت الأول!';
  } else {
    btn.className='bz-btn t'+me.team+' disabled';
    btn.innerHTML='<span class="bz-icon">⏳</span><span class="bz-lbl">'+winner.name+'</span>';
    setRes(winner.name,'يحاول الإجابة الآن...',5,'var(--'+winner.team+')');
    document.getElementById('bz-st').innerText='سبقك '+winner.name;
  }
}

function onSecondChance(team){
  const mine=team===me.team;
  const btn=document.getElementById('main-bz');
  if(mine){
    bzEnabled=true;
    btn.className='bz-btn t'+me.team+' ready';
    btn.innerHTML='<span class="bz-icon">🔥</span><span class="bz-lbl">فرصتكم!</span>';
    document.getElementById('res-card').style.display='none';
    document.getElementById('bz-st').innerText='🔥 الفرصة الثانية! اضغط الآن!';
    document.getElementById('bz-st').style.color='var(--gold)';
  } else {
    btn.className='bz-btn t'+me.team+' disabled';
    btn.innerHTML='<span class="bz-icon">⏳</span><span class="bz-lbl">انتظر</span>';
    document.getElementById('bz-st').innerText='الفريق الآخر يجيب...';
  }
}

function onOpenQ(){
  bzEnabled=true;
  const btn=document.getElementById('main-bz');
  btn.className='bz-btn t'+me.team+' ready';
  btn.innerHTML='<span class="bz-icon">🔓</span><span class="bz-lbl">الكل يجيب!</span>';
  document.getElementById('res-card').style.display='none';
  document.getElementById('bz-st').innerText='🔓 مفتوح للجميع!';
  document.getElementById('bz-st').style.color='var(--gold)';
}

function setRes(name,sub,secs,color){
  const rc=document.getElementById('res-card');
  rc.style.display='block';
  document.getElementById('res-name').style.color=color;
  document.getElementById('res-name').innerText=name;
  document.getElementById('res-sub').innerText=sub;
  startCountdown(secs);
}

function startCountdown(s){
  clearInterval(cdI);
  let t=s;
  document.getElementById('res-count').innerText=t;
  cdI=setInterval(()=>{
    t--;
    document.getElementById('res-count').innerText=Math.max(0,t);
    if(t<=0) clearInterval(cdI);
  },1000);
}

function updateCountdown(s){
  const rc=document.getElementById('res-count');
  if(rc) rc.innerText=s;
}

function resetToWaiting(){
  bzEnabled=false;
  clearInterval(cdI);
  document.getElementById('bzs').classList.remove('active');
  document.getElementById('ws').classList.add('active');
  document.getElementById('wmsg').innerText='في انتظار اختيار سؤال جديد...';
  document.getElementById('qcard').style.display='none';
  document.getElementById('res-card').style.display='none';
}
</script>
</body>
</html>
