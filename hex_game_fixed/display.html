<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Game</title>
</head>
<body>
    <h1>Welcome to the Hex Game</h1>
    <script>
        async function fetchGameState() {
            // Try to fetch the game state with exponential backoff
            const maxRetries = 5;
            let attempts = 0;
            const baseDelay = 1000; // 1 second

            while (attempts < maxRetries) {
                try {
                    const response = await fetch('/api/game-state');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                    validateGameState(data);
                    return data;
                } catch (error) {
                    attempts++;
                    console.error(`Attempt ${attempts} failed: ${error.message}`);
                    if (attempts < maxRetries) {
                        await new Promise(resolve => setTimeout(resolve, baseDelay * Math.pow(2, attempts)));
                    } else {
                        alert('Failed to fetch game state after multiple attempts.');
                    }
                }
            }
        }

        function validateGameState(data) {
            // Validate the game state data
            if (!data || typeof data !== 'object') {
                throw new Error('Invalid game state data');
            }
            // Add more validation as needed
        }

        // Initialize game
        fetchGameState();
    </script>
</body>
</html>
