<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة العرض · تحدي الحروف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
:root{--a:#FF6B6B;--b:#4ECDC4;--gold:#FFE66D;--bg:#0f0f1a;--s1:#1a1a2e;--s2:#16213e;--txt:#e8eaf6;--hs:clamp(60px,8vw,90px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Cairo',sans-serif;color:var(--txt);background:var(--bg);overflow:hidden}
body{background-image:radial-gradient(ellipse 80% 50% at 15% 5%,rgba(255,107,107,.1) 0,transparent 60%),radial-gradient(ellipse 60% 40% at 85% 95%,rgba(78,205,196,.1) 0,transparent 60%)}

/* LAYOUT */
#app{display:flex;width:100vw;height:100vh}

/* LEFT */
.lp{width:200px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:20px 14px;background:rgba(0,0,0,.3);border-left:1px solid rgba(255,255,255,.06)}
.sc{width:100%;border-radius:18px;padding:16px 10px;text-align:center}
.sc.sa{background:rgba(255,107,107,.12);border:2px solid rgba(255,107,107,.3)}
.sc.sb{background:rgba(78,205,196,.12);border:2px solid rgba(78,205,196,.3)}
.sn{font-size:.9rem;font-weight:700;opacity:.8;margin-bottom:4px}
.sp{font-size:3.2rem;font-weight:900;line-height:1}
.sa .sp{color:var(--a)}.sb .sp{color:var(--b)}
.center-lft{text-align:center}
.rl{background:var(--s2);border-radius:40px;padding:6px 16px;font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:10px}
.bz-box{background:var(--s1);border-radius:16px;padding:12px;text-align:center;min-height:70px;display:flex;align-items:center;justify-content:center}
.bz-name{font-size:1.4rem;font-weight:900}
.bz-name.ba{color:var(--a)}.bz-name.bb{color:var(--b)}
.bz-cnt{font-size:2.5rem;font-weight:900;font-family:monospace}
.bz-cnt.ba{color:var(--a)}.bz-cnt.bb{color:var(--b)}
.legend{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.lr{display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;opacity:.7}
.ll{width:20px;height:4px;border-radius:2px;flex-shrink:0}
.conn-msg{color:rgba(232,234,246,.4);font-size:.8rem;text-align:center}

/* CENTER */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.title{font-size:1.6rem;font-weight:900;color:var(--gold);margin-bottom:16px;text-shadow:0 0 20px rgba(255,230,109,.4)}
.qdisp{background:var(--s1);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 20px;font-size:1.5rem;font-weight:700;line-height:1.6;text-align:center;max-width:560px;margin-bottom:16px;min-height:72px;display:flex;align-items:center;justify-content:center}

/* HEX BOARD */
#hex-board{position:relative}
.hex{
  position:absolute;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cairo',sans-serif;font-weight:900;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.13);color:var(--txt);
  transition:all .25s ease;
}
.hex.ca{background:linear-gradient(145deg,var(--a),#c0392b);color:#fff;box-shadow:0 0 18px rgba(255,107,107,.5)}
.hex.cb{background:linear-gradient(145deg,var(--b),#27ae8f);color:#fff;box-shadow:0 0 18px rgba(78,205,196,.5)}
.hex.active-q{animation:pHex .75s ease infinite alternate}
@keyframes pHex{from{box-shadow:0 0 8px var(--gold)}to{box-shadow:0 0 28px var(--gold),0 0 50px rgba(255,230,109,.25)}}
</style>
</head>
<body>
<div id="app">
  <div class="lp">
    <div class="sc sa">
      <div class="sn" id="sna">الفريق أ</div>
      <div class="sp" id="spa">0</div>
    </div>
    <div class="center-lft">
      <div class="rl" id="rnd-lbl">الجولة 1</div>
      <div class="bz-box" id="bz-box"><span style="color:rgba(232,234,246,.3);font-size:.85rem">في انتظار الاتصال...</span></div>
      <div class="legend">
        <div class="lr"><div class="ll" style="background:var(--a)"></div><span>أ — أفقي ◀▶</span></div>
        <div class="lr"><div class="ll" style="background:var(--b)"></div><span>ب — عمودي ▲▼</span></div>
      </div>
    </div>
    <div class="sc sb">
      <div class="sn" id="snb">الفريق ب</div>
      <div class="sp" id="spb">0</div>
    </div>
  </div>

  <div class="center">
    <div class="title" id="ctitle">جاري الاتصال بغرفة الحكم...</div>
    <div class="qdisp" id="qdisp" style="display:none"></div>
    <div id="hex-board"></div>
  </div>
</div>

<script>
const COLS=5,ROWS=5,N=25;
const params=new URLSearchParams(location.search);
const CODE=params.get('code')||'';
const ICE={config:{iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'}
]}};

let peer=new Peer(ICE),brd=[];
let cdI=null;

peer.on('open',()=>{
  if(!CODE){document.getElementById('ctitle').innerText='الرجاء فتح هذه الشاشة من رابط الحكم!';return;}
  const conn=peer.connect('hexgame-'+CODE,{reliable:true});
  conn.on('open',()=>{document.getElementById('ctitle').innerText='متصل ✅ · في انتظار اختيار سؤال...';});
  conn.on('data',d=>{
    if(d.type==='state'){applyState(d.s);}
    if(d.type==='show_q'){showQ(d.q);}
    if(d.type==='buzzer_won'){showBuzzer(d.winner);}
    if(d.type==='second_chance'){showSecond(d.team);}
    if(d.type==='open_q'){showOpen();}
    if(d.type==='tick'){updateCd(d.secs);}
    if(d.type==='correct'||d.type==='skip'){clearBuzzer();}
    if(d.type==='new_round'){document.getElementById('qdisp').style.display='none';}
  });
});

function applyState(s){
  if(!s)return;
  document.getElementById('sna').innerText=s.teamA||'الفريق أ';
  document.getElementById('snb').innerText=s.teamB||'الفريق ب';
  document.getElementById('spa').innerText=s.pts?s.pts.a:0;
  document.getElementById('spb').innerText=s.pts?s.pts.b:0;
  brd=s.board||[];
  renderBoard(s);
  const titles=['','الأولى','الثانية','الثالثة','الرابعة','الخامسة'];
}

function hexPos(i){
  const hs=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hs'))||78;
  const w=hs,h=hs*1.1547,col=i%COLS,row=Math.floor(i/COLS);
  const x=col*w*0.75;
  const y=row*h+(col%2===1?h*0.5:0);
  return{x,y,w,h};
}

function boardSize(){
  const hs=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hs'))||78;
  return{totalW:(COLS-1)*hs*0.75+hs,totalH:(ROWS-1)*hs*1.1547+hs*1.1547*0.5};
}

function renderBoard(s){
  const bd=document.getElementById('hex-board');
  const sz=boardSize();
  bd.style.width=sz.totalW+'px';
  bd.style.height=sz.totalH+'px';
  bd.innerHTML='';
  (s.board||[]).forEach((cell,i)=>{
    const{x,y,w,h}=hexPos(i);
    const div=document.createElement('div');
    div.className='hex';
    if(cell.owner==='a')div.classList.add('ca');
    else if(cell.owner==='b')div.classList.add('cb');
    if(s.activeCell===i)div.classList.add('active-q');
    div.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;font-size:${w*.32}px;`;
    div.innerText=cell.letter;
    bd.appendChild(div);
  });
}

function showQ(q){
  const qd=document.getElementById('qdisp');
  qd.innerText='❓ '+q;
  qd.style.display='flex';
}

function showBuzzer(w){
  const cls='bz-name b'+(w.team==='a'?'a':'b');
  document.getElementById('bz-box').innerHTML=`
    <div>
      <div class="${cls}">${w.name} ⚡</div>
      <div class="bz-cnt b${w.team==='a'?'a':'b'}" id="cd-num">5</div>
    </div>`;
  clearInterval(cdI);
}

function showSecond(team){
  const tname=team==='a'?document.getElementById('sna').innerText:document.getElementById('snb').innerText;
  document.getElementById('bz-box').innerHTML=`<div><div class="bz-name b${team==='a'?'a':'b'}">🔥 ${tname}</div><div style="font-size:.8rem;opacity:.7">الفرصة الثانية</div><div class="bz-cnt b${team==='a'?'a':'b'}" id="cd-num">10</div></div>`;
}

function showOpen(){
  document.getElementById('bz-box').innerHTML=`<div style="color:var(--gold);font-size:1.1rem;font-weight:900">🔓 مفتوح للجميع!</div>`;
}

function updateCd(s){
  const el=document.getElementById('cd-num');
  if(el)el.innerText=s;
}

function clearBuzzer(){
  document.getElementById('bz-box').innerHTML=`<span style="color:rgba(232,234,246,.3);font-size:.85rem">في انتظار السؤال...</span>`;
  document.getElementById('qdisp').style.display='none';
}

window.addEventListener('resize',()=>{if(brd.length)renderBoard({board:brd});});
</script>
</body>
</html>
