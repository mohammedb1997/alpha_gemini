<button onclick="createRoom()">إنشاء غرفة</button>
<input id="letter" placeholder="حرف">
<button onclick="startRound()">ابدأ</button>
<button onclick="startTimer()">⏳ تشغيل المؤقت</button>
<button onclick="reveal()">👁️ إظهار السؤال</button>

<script>
function startRound(){
  let l = document.getElementById("letter").value;
  let q = getQuestion(l);
  update({
    current:{ letter:l, q:q.q, show:false, buzzer:null }
  });
}
function reveal(){
  update({ "current.show":true });
}
</script>
