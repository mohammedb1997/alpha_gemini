<link rel="stylesheet" href="css/style.css">
<div id="hud">
  <div id="scoreA">🔴 0</div>
  <div id="timer">⏳ 30</div>
  <div id="scoreB">🟢 0</div>
</div>
<div id="letter"></div>
<div id="question"></div>
<div id="leaderboard"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

<script>
let scores = {a:0,b:0};
listen();

function updateUI(data){
  document.getElementById("letter").innerText = data.current?.letter || "";
  document.getElementById("timer").innerText = "⏳ " + (data.timer ?? 30);

  if(data.current?.show){
    let q = document.getElementById("question");
    q.style.display="block";
    q.innerText = data.current.q;
  }

  if(data.lastPoint){
    scores[data.lastPoint]++;
    renderScores();
  }
}

function renderScores(){
  document.getElementById("scoreA").innerText = "🔴 "+scores.a;
  document.getElementById("scoreB").innerText = "🟢 "+scores.b;
  document.getElementById("leaderboard").innerHTML =
    `🔴 الفريق الأحمر: ${scores.a}<br>🟢 الفريق الأخضر: ${scores.b}`;
}
</script>
