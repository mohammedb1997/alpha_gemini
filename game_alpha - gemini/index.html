<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الحروف - النمط العادي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: auto; display: block; padding: 20px; }
        .game-container { max-width: 900px; margin: 0 auto; }
        .board-wrapper { margin: 20px 0; }
        .scores-panel {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            background: var(--surface);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid var(--empty-border);
        }
        .score-item { text-align: center; }
        .score-label { font-size: 1.5rem; opacity: 0.9; }
        .score-value { font-size: 3rem; font-weight: 900; color: var(--gold); }
        .btn-reset {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f2333;
            transition: 0.1s;
            margin: 20px 0;
        }
        .btn-reset:active { transform: translateY(4px); box-shadow: 0 4px 0 #0f2333; }
    </style>
</head>
<body>
<div class="game-container">
    <h1 style="text-align:center; color:var(--gold); margin:10px 0;">🏆 تحدي الحروف (محلي)</h1>
    
    <div class="scores-panel">
        <div class="score-item">
            <div class="score-label" style="color:var(--a);">🔵 الأزرق</div>
            <div class="score-value" id="blue-score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label" style="color:var(--b);">🔴 الأحمر</div>
            <div class="score-value" id="red-score">0</div>
        </div>
    </div>

    <div class="board-wrapper">
        <div id="hex-board"></div>
    </div>

    <div style="display:flex; gap:20px; justify-content:center;">
        <button class="btn-reset" onclick="resetGame()">🔄 جولة جديدة</button>
        <button class="btn-reset" onclick="location.href='index.html'" style="background:#7f8c8d;">🏠 الرئيسية</button>
    </div>
</div>

<!-- النوافذ المنبثقة -->
<div id="overlay" class="overlay"></div>
<div id="q-modal" class="modal">
    <h2 id="q-title" style="color:var(--gold);">✨ سؤال حرف</h2>
    <p id="q-text"></p>
    <div class="timer" id="timer">20</div>
    
    <div id="q-display-area">
        <div id="ans-box" class="ans-box">✅ الإجابة: <span id="ans-text"></span></div>
        <div class="btn-group">
            <button class="btn-main" onclick="showAnswer()">🔍 إظهار الإجابة</button>
            <button class="btn-blue" onclick="mark('blue')">🔵 فوز الأزرق</button>
            <button class="btn-red" onclick="mark('red')">🔴 فوز الأحمر</button>
            <button class="btn-change" onclick="changeQuestion()">🔄 تغيير السؤال</button>
            <button class="btn-close" onclick="closeModals()">❌ إغلاق</button>
        </div>
    </div>

    <div id="q-add-area" style="display:none;">
        <p style="color:#e74c3c; font-weight:bold;">⚠️ لا توجد أسئلة! أضف سؤالاً:</p>
        <textarea id="new-q" rows="3" placeholder="اكتب السؤال هنا..."></textarea>
        <input type="text" id="new-a" placeholder="الإجابة الصحيحة">
        <button class="btn-main" onclick="saveNewQuestion()">💾 حفظ واللعب</button>
        <button class="btn-close" onclick="closeModals()">إلغاء</button>
    </div>
</div>

<div id="win-modal" class="modal">
    <div style="font-size:5rem;">🏅</div>
    <h2 id="win-msg" style="color:var(--gold);">فوز رائع!</h2>
    <button class="btn-reset" onclick="resetGame()">🎮 جولة جديدة</button>
    <button class="btn-close" onclick="closeWinModal()" style="background:#bdc3c7;">إغلاق</button>
</div>

<script src="qbank.js"></script>
<script>
    // كود JavaScript كما هو موجود في الملف الأصلي دون تغيير
    // (تأكد من وجوده في ملفك)
</script>
</body>
</html>
